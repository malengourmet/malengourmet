<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MÄLEN GOURMET</title>

<style>
body {
  background: #0b0b0b;
  color: #f5e6d3;
  font-family: 'Georgia', serif;
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  color: #8b0000;
  letter-spacing: 3px;
}

.section {
  margin-top: 35px;
}

.section h2 {
  color: #9b2545;
  border-bottom: 1px solid #9b2545;
  padding-bottom: 5px;
  font-size: 18px;
  letter-spacing: 2px;
}

.item {
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.item b {
  font-size: 15px;
}

.desc {
  font-size: 12px;
  color: #aaa;
  margin: 4px 0;
}

.controls {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 6px;
}

button {
  background: #7a1a2e;
  border: none;
  color: white;
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
}

.qty {
  min-width: 20px;
  text-align: center;
}

#carrito {
  margin-top: 40px;
  padding: 15px;
  border: 1px solid #7a1a2e;
  border-radius: 12px;
  background: #111;
}

#total {
  font-size: 22px;
  margin-top: 10px;
}

.whatsapp {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  background: #25D366;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>MÄLEN GOURMET</h1>

<div id="menu"></div>

<div id="carrito">
<h2>🛒 Tu Pedido</h2>
<div id="lista"></div>
<div id="total">Total: $0</div>
<button class="whatsapp" onclick="enviar()">Enviar por WhatsApp</button>
</div>

<script>
const productos = [

{cat:"BOXES", items:[
{n:"Box Salmón 15p",d:"BSAS · SPF · TAMAGO · PHILADELPHIA · PEP · GEISHA",p:32000},
{n:"Box Salmón 30p",d:"BSAS · SPF · TAMAGO · PHILADELPHIA · PEP · GEISHA",p:55000},

{n:"Box Especial 15p",d:"TAMAGO · SPF · MANGO · PEP · TAMIKAMA · KANI",p:31000},
{n:"Box Especial 30p",d:"TAMAGO · SPF · MANGO · PEP · TAMIKAMA · KANI",p:52000},

{n:"Box Lanikama 15p",d:"CITRIC · MANGO · HOT SHRIMP · KANI · TAMIKAMA",p:28000},
{n:"Box Lanikama 30p",d:"CITRIC · MANGO · HOT SHRIMP · KANI · TAMIKAMA",p:50000},

{n:"Box Cocido 30p",d:"SPF APANADO · CEVICHE · HOT SHRIMP · CITRIC · MANGO · TAMIKAMA",p:55000},

{n:"Box Premium 30p",d:"CEVICHE · LOI · TIGER · NIGUIRI SALMÓN · MANGO · DRAGON",p:60000},

{n:"Rolls x 8 piezas",d:"Variedad a elección",p:18000},

{n:"Gohan",d:"Mixta / Salmón / Langostino / Veggie",p:20000},
]},

{cat:"ENTRADAS", items:[
{n:"Langostinos apanados",d:"Porción 5 unidades",p:14000},
{n:"Arrolladitos primavera",d:"Porción 3 unidades",p:9000},
{n:"Ceviche chico",d:"",p:15000},
{n:"Ceviche grande",d:"",p:22000},
]},

{cat:"EXTRAS", items:[
{n:"Salsa Teriyaki",d:"",p:4000},
{n:"Salsa Buenos Aires",d:"",p:3500},
]}

];

let carrito = {};

function renderMenu(){
let html = "";
productos.forEach(sec=>{
html += `<div class="section"><h2>${sec.cat}</h2>`;
sec.items.forEach(i=>{
html += `
<div class="item">
<b>${i.n}</b>
<div class="desc">${i.d}</div>

<div class="controls">
<button onclick="cambiar('${i.n}',${i.p},-1)">-</button>
<span class="qty" id="q-${i.n}">0</span>
<button onclick="cambiar('${i.n}',${i.p},1)">+</button>
<span>$${i.p.toLocaleString()}</span>
</div>

</div>`;
});
html += "</div>";
});
document.getElementById("menu").innerHTML = html;
}

function cambiar(n,p,c){
if(!carrito[n]) carrito[n]={n,p,q:0};
carrito[n].q += c;
if(carrito[n].q<=0) delete carrito[n];

document.getElementById("q-"+n).innerText = carrito[n]?.q || 0;

renderCarrito();
}

function renderCarrito(){
let lista = "";
let total = 0;

Object.values(carrito).forEach(i=>{
lista += `<div>${i.q}x ${i.n}</div>`;
total += i.q * i.p;
});

document.getElementById("lista").innerHTML = lista || "Sin productos";
document.getElementById("total").innerText = "Total: $" + total.toLocaleString();
}

function enviar(){
let items = Object.values(carrito);
if(!items.length){
alert("Agregá productos");
return;
}

let msg = "Hola! Quiero pedir:\n\n";
let total = 0;

items.forEach(i=>{
msg += `- ${i.q}x ${i.n}\n`;
total += i.q * i.p;
});

msg += "\nTotal: $" + total.toLocaleString();

window.open("https://wa.me/5492964568891?text=" + encodeURIComponent(msg));
}

renderMenu();
</script>

</body>
</html>
